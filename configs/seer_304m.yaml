seer_304m:
  model:
    block_size: 1024 #Context windo
    vocab_size: 50257 #Vocab size from our tokenizer
    n_layer: 12 #Number of total blocks of attention and MLP
    n_head: 12 #Number of heads in multihead attention
    n_embd: 768 #Embedding dimensions for our tokens
    dropout: 0.0 #Probability element is 0 out
    bias: True #Watn layers to include bias term

  train:
    learning_rate: 6.0e-4
    min_lr: 6.0e-5
    warmup_steps: 700
    max_steps: 19000
    weight_decay: 0.1
    beta1: 0.9
    beta2: 0.95
    grad_clip: 1.0
    total_batch_size: 524288
    micro_batch_size: 32
    block_size: 1024
    eval_interval: 250
    eval_iters: 200
    log_interval: 10
  system:
    device: cpu #On mac book
    dtype: bfloat16
    compile: true
    seed: 1337
    out_dir: "checkpoints"
    resume: false
    data_dir: "..."
    price_per_hour: 2.10
    gpu_peak_flops: 312.0e+12

dpo:
  data:
    data: trl-lib/ultrafeedback_binarized
    max_len: 512
  train:
    beta: 0.1
    lr: 5e-7
    epochs: 1
    batch_size: 4
    grad_accum: 8
    lr_scheduler: cosine
    warmup_ratio: 0.1
    weight_decay: 0.0
    bf16: true
    logging_steps: 10
    eval_ratio: 0.02
    eval_steps: 50
    save_steps: 50
    save_total_limit: 2
    seed: 1337
    run_name: seer-dpo
    wandb_project: seer
